name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.38.3'

jobs:
  checks:
    name: Format, Analyze & Test
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push formatting changes
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Create app_secrets.dart from template
        run: cp lib/app_secrets/app_secrets.dart.example lib/app_secrets/app_secrets.dart

      - name: Hygiene check (unused imports, deprecated APIs, etc.)
        run: dart fix --dry-run .

      - name: Format code
        run: dart format .

      - name: Check for formatting changes
        id: format-check
        run: |
          if git diff --quiet .; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push formatting changes
        if: steps.format-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "style: apply dart format"
          git push

      - name: Analyze project source
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Upload coverage to Codecov
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
